<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1400" width="1400" height="1400" role="img" aria-label="The Hard Way — An Unofficial Leader Series. Cover art.">
  <defs>
    <radialGradient id="glowA" cx="18%" cy="22%" r="60%">
      <stop offset="0%" stop-color="#4F7CFF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#4F7CFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="82%" cy="78%" r="55%">
      <stop offset="0%" stop-color="#6EA0FF" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#6EA0FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4F7CFF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#6EA0FF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#4F7CFF" stop-opacity="0"/>
    </linearGradient>
    <style><![CDATA[
      .bg { fill: #0B1020; }
      .eyebrow {
        font-family: 'JetBrains Mono', 'SF Mono', Menlo, ui-monospace, monospace;
        font-size: 30px;
        font-weight: 600;
        fill: #6EA0FF;
        letter-spacing: 7px;
      }
      .title {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-weight: 900;
        letter-spacing: -0.04em;
        fill: #ffffff;
      }
      .title.accent { fill: #6EA0FF; }
      .caveat {
        font-family: 'Caveat', 'Bradley Hand', 'Apple Chancery', cursive;
        font-size: 68px;
        font-weight: 500;
        fill: #6EA0FF;
      }
      .hosts {
        font-family: 'JetBrains Mono', 'SF Mono', Menlo, ui-monospace, monospace;
        font-size: 26px;
        font-weight: 500;
        fill: #9aa3b8;
        letter-spacing: 5px;
      }
      .dot { fill: #6EA0FF; }
    ]]></style>
  </defs>

  <rect class="bg" width="1400" height="1400"/>
  <rect width="1400" height="1400" fill="url(#glowA)"/>
  <rect width="1400" height="1400" fill="url(#glowB)"/>

  <g transform="translate(380, 175)">
    <rect width="640" height="60" rx="30"
          fill="#4F7CFF" fill-opacity="0.08"
          stroke="#4F7CFF" stroke-opacity="0.25"
          stroke-width="1"/>
    <circle class="dot" cx="40" cy="30" r="5"/>
    <text class="eyebrow" x="335" y="40" text-anchor="middle">AN UNOFFICIAL LEADER SERIES</text>
  </g>

  <text class="title" x="700" y="490" text-anchor="middle" font-size="180">THE</text>
  <text class="title accent" x="700" y="740" text-anchor="middle" font-size="260">HARD</text>
  <text class="title" x="700" y="960" text-anchor="middle" font-size="180">WAY</text>

  <line x1="450" y1="1075" x2="950" y2="1075" stroke="url(#rule)" stroke-width="1.5"/>
  <text class="caveat" x="700" y="1150" text-anchor="middle">some folks got to learn the hard way</text>

  <text class="hosts" x="700" y="1285" text-anchor="middle">IAN COWPAR &#215; VANESSA M NEDVINS</text>
</svg>
